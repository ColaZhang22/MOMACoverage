defaults:
  - /experiment/base_experiment@_here_
  - _self_

# Collection
max_n_frames: 1_000_000
off_policy_n_envs_per_worker: 8
off_policy_collected_frames_per_batch: 4_000
parallel_collection: True

# MADDPG replay training
lr: 0.00001
gamma: 0.995
off_policy_n_optimizer_steps: 32
off_policy_train_batch_size: 512
off_policy_memory_size: 500_000
off_policy_init_random_frames: 40_000
off_policy_use_prioritized_replay_buffer: False
off_policy_prb_alpha: 0.6
off_policy_prb_beta: 0.4

# Stabilize target values and retain exploration for the full run.
soft_target_update: True
polyak_tau: 0.001
exploration_eps_init: 0.8
exploration_eps_end: 0.3
exploration_anneal_frames: 1_000_000
clip_grad_norm: True
clip_grad_val: 1

# Evaluation
evaluation: True
evaluation_interval: 20_000
evaluation_episodes: 8
evaluation_deterministic_actions: True
parallel_evaluation: True
evaluation_parallel_rollout_rounds: 1

adaptive_preference_sampler: false
checkpoint_interval: 200_000
keep_checkpoints_num: 2
project_name: "aaai"
sampling_device: "cpu"
train_device: "cuda"
buffer_device: "cpu"
render: false
