defaults:
  - base_experiment  

# max_n_frames:  3000_000 # 3 agents
max_n_frames: 1000_000 # 4 agents

on_policy_n_envs_per_worker: 8
# on_policy_collected_frames_per_batch: 12000  # 3 agents
on_policy_collected_frames_per_batch: 4000   # 4 agents
# on_policy_minibatch_size: 4000 # 3 agents
on_policy_minibatch_size: 500 # 4 agents
on_policy_n_minibatch_iters: 15

# ver2: 8 envs, 4000 frames per batch, 1500 minibatch size, 8 minibatch iters
# on_policy_n_envs_per_worker: 8
# on_policy_collected_frames_per_batch: 4000  
# on_policy_minibatch_size: 500
# on_policy_n_minibatch_iters: 15

off_policy_n_envs_per_worker: 8
off_policy_collected_frames_per_batch: 4000
off_policy_memory_size: 200_000
off_policy_n_optimizer_steps: 500
# off_policy_train_batch_size: 256
# off_policy_init_random_frames: 10000
off_policy_use_prioritized_replay_buffer: True

evaluation_episodes: 8
parallel_evaluation: True
evaluation_parallel_rollout_rounds: 1
adaptive_preference_sampler: false

lr: 0.001
# lr: 0.00005
evaluation_interval: 20_000  
parallel_collection: True
evaluation_deterministic_actions: False
checkpoint_interval: 200_000   
keep_checkpoints_num: 2
# clip_grad_val: 1

project_name: "aaai"
sampling_device: "cpu" 
train_device: "cuda"
buffer_device: "cuda"
render: false